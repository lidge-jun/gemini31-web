<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 3.1 Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #4285f4, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .badge {
            font-size: 11px;
            background: rgba(66, 133, 244, 0.15);
            color: #4285f4;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 500;
        }

        .settings {
            padding: 12px 24px;
            display: flex;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .settings select,
        .settings input[type=range] {
            background: #16161f;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #e0e0e8;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
        }

        .settings label {
            font-size: 12px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.65;
            font-size: 14px;
            word-break: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
            }
        }

        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #1a3a6e, #1e2a5e);
            border: 1px solid rgba(66, 133, 244, 0.2);
            white-space: pre-wrap;
        }

        .msg.ai {
            align-self: flex-start;
            background: #16161f;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* Markdown content styling */
        .msg.ai .md-content {
            line-height: 1.7;
        }

        .msg.ai .md-content p {
            margin: 0.5em 0;
        }

        .msg.ai .md-content p:first-child {
            margin-top: 0;
        }

        .msg.ai .md-content p:last-child {
            margin-bottom: 0;
        }

        .msg.ai .md-content pre {
            background: #0d0d14;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
            margin: 0.6em 0;
        }

        .msg.ai .md-content code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
        }

        .msg.ai .md-content :not(pre)>code {
            background: rgba(255, 255, 255, 0.06);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .msg.ai .md-content ul,
        .msg.ai .md-content ol {
            padding-left: 1.4em;
            margin: 0.4em 0;
        }

        .msg.ai .md-content blockquote {
            border-left: 3px solid #4285f4;
            padding-left: 12px;
            color: #aaa;
            margin: 0.5em 0;
        }

        .msg.ai .md-content h1,
        .msg.ai .md-content h2,
        .msg.ai .md-content h3 {
            margin: 0.6em 0 0.3em;
            font-weight: 600;
        }

        .msg.ai .md-content table {
            border-collapse: collapse;
            margin: 0.5em 0;
            width: 100%;
        }

        .msg.ai .md-content th,
        .msg.ai .md-content td {
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 10px;
            font-size: 13px;
        }

        .msg.ai .md-content th {
            background: rgba(255, 255, 255, 0.04);
        }

        /* Thinking panel */
        .thinking-panel {
            margin-bottom: 6px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(167, 139, 250, 0.15);
            background: rgba(167, 139, 250, 0.04);
        }

        .thinking-panel summary {
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 500;
            color: #a78bfa;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 6px;
            list-style: none;
        }

        .thinking-panel summary::-webkit-details-marker {
            display: none;
        }

        .thinking-panel summary::before {
            content: '▶';
            font-size: 9px;
            transition: transform 0.2s;
        }

        .thinking-panel[open] summary::before {
            transform: rotate(90deg);
        }

        .thinking-panel .thinking-content {
            padding: 0 14px 12px;
            font-size: 13px;
            line-height: 1.6;
            color: #9990b8;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        /* Streaming indicator */
        .thinking-panel.streaming summary .indicator {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #a78bfa;
            animation: pulse 1s infinite;
            margin-left: 4px;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }

        .msg.ai .meta {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 11px;
            color: #666;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .msg.ai .meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .msg.error {
            background: #2a1020;
            border: 1px solid rgba(255, 80, 80, 0.2);
            color: #ff8888;
        }

        .loading {
            align-self: flex-start;
            padding: 14px 18px;
            font-size: 14px;
            color: #666;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0% {
                content: '⠋';
            }

            14% {
                content: '⠙';
            }

            28% {
                content: '⠹';
            }

            42% {
                content: '⠸';
            }

            57% {
                content: '⠼';
            }

            71% {
                content: '⠴';
            }

            85% {
                content: '⠦';
            }

            100% {
                content: '⠧';
            }
        }

        /* Streaming cursor */
        .streaming-cursor::after {
            content: '▊';
            animation: blink 0.8s infinite;
            color: #4285f4;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0;
            }

            50% {
                opacity: 1;
            }
        }

        .input-area {
            padding: 16px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            gap: 10px;
        }

        .input-area textarea {
            flex: 1;
            background: #16161f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e0e8;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            height: 48px;
            max-height: 150px;
            transition: border-color 0.2s;
        }

        .input-area textarea:focus {
            outline: none;
            border-color: #4285f4;
        }

        .input-area button {
            background: linear-gradient(135deg, #4285f4, #6366f1);
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .input-area button:hover {
            opacity: 0.85;
        }

        .input-area button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>💎 Gemini 3.1 Pro Preview</h1>
        <span class="badge">Vertex AI · Streaming</span>
    </div>
    <div class="settings">
        <label>Model
            <select id="model">
                <option value="gemini-3.1-pro-preview" selected>3.1 Pro Preview</option>
                <option value="gemini-3-pro-preview">3 Pro Preview</option>
                <option value="gemini-2.5-pro-preview-05-06">2.5 Pro</option>
                <option value="gemini-2.5-flash-preview-05-20">2.5 Flash</option>
            </select>
        </label>
        <label>Thinking
            <select id="thinkingLevel">
                <option value="high" selected>High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
                <option value="minimal">Minimal</option>
            </select>
        </label>
        <label>Temp <span id="tempVal">0.7</span>
            <input type="range" id="temp" min="0" max="2" step="0.1" value="0.7">
        </label>
    </div>
    <div class="chat" id="chat"></div>
    <div class="input-area">
        <textarea id="input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
        <button id="send">전송</button>
    </div>
    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const tempSlider = document.getElementById('temp');
        const tempVal = document.getElementById('tempVal');

        // Configure marked for safe rendering
        marked.setOptions({ breaks: true, gfm: true });

        tempSlider.oninput = () => tempVal.textContent = tempSlider.value;

        input.addEventListener('input', () => {
            input.style.height = '48px';
            input.style.height = Math.min(input.scrollHeight, 150) + 'px';
        });

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && e.keyCode !== 229) {
                e.preventDefault();
                send();
            }
        });

        sendBtn.onclick = send;

        async function send() {
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            input.style.height = '48px';
            sendBtn.disabled = true;

            // User message
            chat.innerHTML += `<div class="msg user">${esc(text)}</div>`;

            // Create AI message container
            const aiMsg = document.createElement('div');
            aiMsg.className = 'msg ai';
            chat.appendChild(aiMsg);

            // Thinking panel (collapsible)
            const thinkingPanel = document.createElement('details');
            thinkingPanel.className = 'thinking-panel streaming';
            thinkingPanel.open = true;
            thinkingPanel.innerHTML = `<summary>🧠 Thinking <span class="indicator"></span></summary><div class="thinking-content"></div>`;
            aiMsg.appendChild(thinkingPanel);

            // Response content area
            const contentDiv = document.createElement('div');
            contentDiv.className = 'md-content streaming-cursor';
            aiMsg.appendChild(contentDiv);

            // Meta area (filled later)
            const metaDiv = document.createElement('div');
            metaDiv.className = 'meta';
            metaDiv.style.display = 'none';
            aiMsg.appendChild(metaDiv);

            chat.scrollTop = chat.scrollHeight;

            let thinkingText = '';
            let responseText = '';
            let hasThinking = false;

            try {
                const res = await fetch('/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: text,
                        model: document.getElementById('model').value,
                        temperature: parseFloat(tempSlider.value),
                        thinking_level: document.getElementById('thinkingLevel').value,
                    }),
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // Parse SSE events from buffer
                    const events = buffer.split('\n\n');
                    buffer = events.pop(); // Keep incomplete event in buffer

                    for (const eventBlock of events) {
                        if (!eventBlock.trim()) continue;

                        let eventType = '';
                        let eventData = '';

                        for (const line of eventBlock.split('\n')) {
                            if (line.startsWith('event: ')) {
                                eventType = line.slice(7);
                            } else if (line.startsWith('data: ')) {
                                eventData = line.slice(6);
                            }
                        }

                        if (eventType === 'thinking') {
                            hasThinking = true;
                            thinkingText += eventData;
                            thinkingPanel.querySelector('.thinking-content').textContent = thinkingText;
                            // Auto-scroll thinking panel
                            const tc = thinkingPanel.querySelector('.thinking-content');
                            tc.scrollTop = tc.scrollHeight;
                        } else if (eventType === 'text') {
                            responseText += eventData;
                            contentDiv.innerHTML = marked.parse(responseText);
                        } else if (eventType === 'meta') {
                            try {
                                const m = JSON.parse(eventData);
                                metaDiv.style.display = 'flex';
                                metaDiv.innerHTML = `
                                    <span>🧠 thinking: ${m.thinking}</span>
                                    <span>📝 output: ${m.output}</span>
                                    <span>📥 input: ${m.input}</span>
                                    <span>📊 total: ${m.total}</span>
                                    <span>✅ ${m.finishReason}</span>
                                    <span>🤖 ${m.model}</span>
                                `;
                                // Update thinking panel summary with token count
                                if (m.thinking > 0) {
                                    thinkingPanel.querySelector('summary').innerHTML =
                                        `🧠 Thinking · ${m.thinking} tokens`;
                                }
                            } catch (_) { }
                        } else if (eventType === 'error') {
                            contentDiv.innerHTML = `<span style="color:#ff8888">❌ ${esc(eventData)}</span>`;
                        } else if (eventType === 'done') {
                            // Stream finished
                        }

                        chat.scrollTop = chat.scrollHeight;
                    }
                }
            } catch (e) {
                contentDiv.innerHTML = `<span style="color:#ff8888">❌ ${esc(e.message)}</span>`;
            }

            // Clean up streaming indicators
            contentDiv.classList.remove('streaming-cursor');
            thinkingPanel.classList.remove('streaming');
            thinkingPanel.querySelector('.indicator')?.remove();

            // If no thinking occurred, remove the panel entirely
            if (!hasThinking) {
                thinkingPanel.remove();
            } else {
                // Collapse thinking after completion
                thinkingPanel.open = false;
            }

            sendBtn.disabled = false;
            chat.scrollTop = chat.scrollHeight;
            input.focus();
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        input.focus();
    </script>
</body>

</html>
